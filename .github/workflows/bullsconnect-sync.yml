name: BullsConnect Daily Sync

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-members:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore BullsConnect auth state from secret
        run: |
          if [ -z "${{ secrets.BULLSCONNECT_STORAGE_STATE_B64 }}" ]; then
            echo "Missing secret BULLSCONNECT_STORAGE_STATE_B64"
            exit 1
          fi

          mkdir -p .auth
          echo "${{ secrets.BULLSCONNECT_STORAGE_STATE_B64 }}" | base64 -d > .auth/bullsconnect-storage.json

      - name: Sync SOAR member count
        run: npm run bullsconnect:sync

      - name: Commit updated member count
        run: |
          if git diff --quiet -- data/soar-member-count.json; then
            echo "No member count changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/soar-member-count.json
          git commit -m "chore: sync SOAR member count"
          git push
