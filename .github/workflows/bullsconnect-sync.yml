name: BullsConnect Daily Sync

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync-members:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore BullsConnect auth state from secret
        run: |
          if [ -z "${{ secrets.BULLSCONNECT_STORAGE_STATE_B64 }}" ]; then
            echo "Missing secret BULLSCONNECT_STORAGE_STATE_B64"
            exit 1
          fi

          mkdir -p .auth
          echo "${{ secrets.BULLSCONNECT_STORAGE_STATE_B64 }}" | base64 -d > .auth/bullsconnect-storage.json

      - name: Sync SOAR member count
        id: sync
        continue-on-error: true
        run: npm run bullsconnect:sync

      - name: Create or update issue on sync failure
        if: steps.sync.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "BullsConnect sync failed: refresh auth session";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "The scheduled BullsConnect sync failed.",
              "",
              "Most common cause: expired BullsConnect/USF SSO session state in `BULLSCONNECT_STORAGE_STATE_B64`.",
              "",
              "### Action items",
              "1. Run `npm run bullsconnect:auth` locally.",
              "2. Re-encode `.auth/bullsconnect-storage.json` to base64.",
              "3. Update GitHub secret `BULLSCONNECT_STORAGE_STATE_B64`.",
              "4. Re-run this workflow.",
              "",
              `Failed run: ${runUrl}`,
              `Timestamp (UTC): ${new Date().toISOString()}`,
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["automation", "bug"],
              });
            }

      - name: Fail workflow after alert
        if: steps.sync.outcome == 'failure'
        run: |
          echo "BullsConnect sync failed; issue has been created/updated."
          exit 1

      - name: Commit updated member count
        if: steps.sync.outcome == 'success'
        run: |
          if git diff --quiet -- data/soar-member-count.json; then
            echo "No member count changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/soar-member-count.json
          git commit -m "chore: sync SOAR member count"
          git push
